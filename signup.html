<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - GreenFlow Agriculture</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🌿</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-shapes" aria-hidden="true">
      <span class="shape shape-1"></span>
      <span class="shape shape-2"></span>
      <span class="shape shape-3"></span>
    </div>

    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-header">
          <span class="brand-icon">🌿</span>
          <h1>GreenFlow</h1>
          <p>Create Your Account</p>
        </div>

        <form class="auth-form" id="signupForm" action="https://formspree.io/f/xwpovlje" method="post">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input 
                type="text" 
                id="firstName" 
                name="firstName" 
                placeholder="John"
                required 
              />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input 
                type="text" 
                id="lastName" 
                name="lastName" 
                placeholder="Doe"
                required 
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="you@example.com"
              required 
            />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input 
              type="tel" 
              id="phone" 
              name="phone" 
              placeholder="+20 XXX XXXX XXXX"
            />
          </div>

          <div class="form-group">
            <label for="farmName">Farm Name</label>
            <input 
              type="text" 
              id="farmName" 
              name="farmName" 
              placeholder="Your farm name"
              required 
            />
          </div>

          <div class="form-group">
            <label for="farmSize">Farm Size (Fadan)</label>
            <input 
              type="number" 
              id="farmSize" 
              name="farmSize" 
              placeholder="e.g., 10"
              required 
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Create a strong password"
              required 
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input 
              type="password" 
              id="confirmPassword" 
              name="confirmPassword" 
              placeholder="Confirm your password"
              required 
            />
          </div>

          <label class="terms-agreement">
            <input type="checkbox" name="terms" required />
            I agree to the Terms and Conditions
          </label>

          <button type="submit" class="auth-btn">Create Account</button>

          <div class="auth-divider">
            <span>OR</span>
          </div>

          <button type="button" class="social-btn google-btn">
            <span>🔍</span> Sign up with Google
          </button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
      </div>

      <div class="auth-side-image">
        <img 
          src="https://images.unsplash.com/photo-1574943320219-553eb213f72d?auto=format&fit=crop&w=600&q=80" 
          alt="Modern agriculture technology"
        />
        <div class="image-overlay">
          <h2>Start Your Journey</h2>
          <p>Join our community of intelligent farmers</p>
        </div>
      </div>
    </div>

    <script>
      document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
          alert('Passwords do not match!');
          return;
        }

        const email = document.getElementById('email').value;
        const farmName = document.getElementById('farmName').value;
        localStorage.setItem('userEmail', email);
        localStorage.setItem('farmName', farmName);
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = 'solution.html';
      });

      document.querySelector('.google-btn').addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.setItem('isLoggedIn', 'true');
        document.body.innerHTML = `<h3>Google Sign-Up is currently unavailable. Please use the form to create an account.</h3> 
        
        <a href="signup.html">Back to Sign Up</a>`;
      });
    </script>
  </body>
</html>
